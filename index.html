<!-- MAIN CONTENT — always centred with fixed positioning -->
<div class="content">
  <div class="building-name-main">
    <div class="building-name-rule"></div>
    <div class="building-name-text">Research &amp; Innovation Complex</div>
    <div class="building-name-rule"></div>
  </div>

  <div class="greeting-sub">تتقدم أرامكو السعودية</div>
  <span class="greeting-sub">بأطيب التهاني والتبريكات بمناسبة</span>

  <div class="greeting-ar">عيد الفطر المبارك</div>
  <div class="greeting-sub">تقبل الله منا ومنكم صالح الأعمال</div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-hex"></div>
    <div class="divider-line"></div>
  </div>

  <div class="greeting-en">Eid Al-Fitr Mubarak</div>
</div>

<!-- HINT BAR -->
<div class="hint-bar">
  <div class="hint-bar-icon">
    <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </div>
  <div class="hint-bar-text">
    <span class="hint-bar-title">Tap any hexagon to leave your Eid greeting</span>
  </div>
  <div class="hint-bar-arrow">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- COUNTER -->
<div class="counter-badge" id="counterBadge">
  <span id="countNum">0</span> greetings out of <span id="countTotal">0</span>
</div>

<!-- DRAW MODALS CONTAINER -->
<div id="modalsContainer"></div>

<!-- TOAST -->
<div class="toast" id="toast">✦ Your greeting has been added!</div>
