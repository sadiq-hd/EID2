<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>عيد الفطر المبارك — Research and Innovation Complex</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
 <!-- Building name large, below greeting -->
  <div class="building-name-main">
    <div class="building-name-rule"></div>
    <div class="building-name-text">Research &amp; Innovation Complex</div>
    <div class="building-name-rule"></div>
  </div>
</div>

<div class="bg"></div>
<canvas id="floatCanvas"></canvas>
<canvas id="hexCanvas"></canvas>

<!-- MAIN CONTENT -->
<div class="content">




<div class="greeting-sub">
تتقدم أرامكو السعودية 
</div>
<span class="greeting-sub">بأطيب التهاني والتبريكات بمناسبة </span>
<br>
<div class="greeting-ar">عيد الفطر المبارك</div>


<div class="greeting-sub">
تقبل الله منا ومنكم صالح الأعمال
</div>

<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-hex"></div>
  <div class="divider-line"></div>
</div>

<div class="greeting-en">Eid Al-Fitr Mubarak</div>

</div>

<!-- COUNTER -->
<div class="counter-badge" id="counterBadge">
  <span id="countNum">0</span> معايدة من أصل <span id="countTotal">0</span>
</div>

<!-- DRAW MODALS CONTAINER (supports multiple simultaneous) -->
<div id="modalsContainer"></div>

<!-- READ MODAL -->
<div class="read-overlay" id="readOverlay">
  <div class="read-card">
    <div class="read-img-wrap">
      <img class="read-img" id="readImg" src="" alt="معايدة">
    </div>
    <div class="read-close" id="readClose">Close ✕</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✦ تمّت إضافة معايدتك!</div>

<script src="script.js"></script>
</body>
</html>
