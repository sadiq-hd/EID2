<!-- LEFT DECORATIVE HEXAGONS
<div class="hex-wrapper left-side">
  <svg class="hex-svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMinYMax meet">
    <defs>
      <polygon id="big-h" points="100,0 50,-86.6 -50,-86.6 -100,0 -50,86.6 50,86.6"/>
      <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CFEFA8"/><stop offset="100%" stop-color="#9ED44A"/></linearGradient>

    </defs>
    <g transform="translate(100,1100)">
      <use href="#big-h" x="0"   y="0"     fill="url(#g1)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="155" y="87"    fill="url(#g2)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="310" y="0"     fill="url(#g3)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="465" y="87"    fill="url(#g1)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="0"   y="-174"  fill="url(#g2)" stroke="white" stroke-width="8"/>

      <use href="#big-h" x="620" y="-174"  fill="url(#g3)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="0"   y="-348"  fill="url(#g3)" stroke="white" stroke-width="8"/>

      <use href="#big-h" x="310" y="-348"  fill="url(#g2)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="465" y="-261"  fill="url(#g3)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="620" y="-348"  fill="url(#g1)" stroke="white" stroke-width="8"/>

      <use href="#big-h" x="465" y="-435"  fill="url(#g2)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="620" y="-522"  fill="url(#g3)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="0"   y="-696"  fill="url(#g2)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="155" y="-609"  fill="url(#g3)" stroke="white" stroke-width="8"/>
      <use href="#big-h" x="310" y="-696"  fill="url(#g1)" stroke="white" stroke-width="8"/>

<!-- MAIN CONTENT -->
<div class="content">
  <div class="greeting-ar">عيد الفطر المبارك</div>
  <div class="greeting-sub">تقبّل الله منّا ومنكم صالح الأعمال</div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-hex"></div>
    <div class="divider-line"></div>
  </div>
  <div class="greeting-en">Eid Al-Fitr Mubarak</div>
  <div class="hijri-date" id="hijriDate"></div>
</div>

<!-- COUNTER -->
<div class="counter-badge" id="counterBadge">
  <span id="countNum">0</span> معايدة من أصل <span id="countTotal">0</span>
</div>

<!-- DRAW MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>✦ اكتب معايدتك بإصبعك</h2>
      <p>ارسم معايدتك باللمس — ستظهر على الشاشة للجميع</p>
    </div>
    <div class="name-field">
      <label>اسمك:</label>
      <input type="text" id="nameInput" placeholder="اختياري…" maxlength="40" autocomplete="off">
    </div>
    <div class="draw-wrap">
      <canvas id="drawCanvas"></canvas>
      <div class="draw-toolbar">
        <div class="toolbar-left">
          <span class="tool-label">اللون:</span>
          <div class="swatch active" data-color="#1c5870" style="background:#1c5870" title="أزرق داكن"></div>
          <div class="swatch"        data-color="#1C6840" style="background:#1C6840" title="أخضر داكن"></div>
          <div class="swatch"        data-color="#C8920A" style="background:#C8920A" title="ذهبي"></div>
          <div class="swatch"        data-color="#8B1A1A" style="background:#8B1A1A" title="أحمر داكن"></div>
          <div class="swatch"        data-color="#4A1A7A" style="background:#4A1A7A" title="بنفسجي داكن"></div>
        </div>
        <div class="toolbar-right">
          <span class="tool-label">الحجم:</span>
          <button class="size-btn"        data-size="3"  style="width:26px;height:26px;"><span style="width:4px;height:4px;"></span></button>
          <button class="size-btn active" data-size="6"  style="width:30px;height:30px;"><span style="width:8px;height:8px;"></span></button>
          <button class="size-btn"        data-size="11" style="width:34px;height:34px;"><span style="width:13px;height:13px;"></span></button>
          <button class="btn-clear" id="clearBtn">مسح ↺</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary"   id="submitBtn">نشر المعايدة ✦</button>
      <button class="btn btn-secondary" id="cancelBtn">إلغاء</button>
    </div>
  </div>
</div>

<!-- READ MODAL -->
<div class="read-overlay" id="readOverlay">
  <div class="read-card">
    <div class="read-name" id="readName"></div>
    <img class="read-img" id="readImg" src="" alt="معايدة">
    <div class="read-close" id="readClose">إغلاق</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✦ تمّت إضافة معايدتك!</div>

<script src="script.js"></script>
</body>
</html>
