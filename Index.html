<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد الفطر المبارك — Research and Innovation Complex</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<!-- TOP BAR -->
<div class="building-name-top">
    <div class="building-name-line"></div>
    <span>Research and Innovation Complex</span>
    <div class="building-name-line"></div>
</div>

<!-- MOON -->
<div class="moon-container">
    <svg width="180" height="180" viewBox="0 0 180 180">
        <defs>
            <radialGradient id="cGrad"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="35%" stop-color="#B8F0E0"/><stop offset="100%" stop-color="#2A7AB8"/></radialGradient>
            <mask id="cMask"><rect width="180" height="180" fill="white"/><circle cx="116" cy="70" r="64" fill="black"/></mask>
            <filter id="mGlow"><feGaussianBlur stdDeviation="8"/></filter>
        </defs>
        <circle cx="80" cy="90" r="72" fill="url(#cGrad)" mask="url(#cMask)" filter="url(#mGlow)"/>
    </svg>
</div>

<!-- LEFT SIDE (BIG HEXAGONS) -->
<div class="hex-wrapper left-side">
    <svg class="hex-svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMinYMax meet">
        <defs>
            <!-- Increased size from 70 to 100 -->
            <polygon id="big-h" points="100,0 50,-86.6 -50,-86.6 -100,0 -50,86.6 50,86.6"/>
            <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CFEFA8"/><stop offset="100%" stop-color="#9ED44A"/></linearGradient>
            <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A6E0A0"/><stop offset="100%" stop-color="#6FC06E"/></linearGradient>
            <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9ED7CC"/><stop offset="100%" stop-color="#5CC8A0"/></linearGradient>
        </defs>
       <g transform="translate(100, 1100)">
    <!-- Row 1 (Bottom) -->
    <use href="#big-h" x="0" y="0" fill="url(#g1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="155" y="87" fill="url(#g2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="310" y="0" fill="url(#g3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="465" y="87" fill="url(#g1)" stroke="white" stroke-width="8"/>
    
    <!-- Row 2 -->
    <use href="#big-h" x="0" y="-174" fill="url(#g2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="155" y="-87" fill="url(#g3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="310" y="-174" fill="url(#g1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="465" y="-87" fill="url(#g2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="620" y="-174" fill="url(#g3)" stroke="white" stroke-width="8"/>

    <!-- Row 3 -->
    <use href="#big-h" x="0" y="-348" fill="url(#g3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="155" y="-261" fill="url(#g1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="310" y="-348" fill="url(#g2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="465" y="-261" fill="url(#g3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="620" y="-348" fill="url(#g1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="775" y="-261" fill="url(#g2)" stroke="white" stroke-width="8"/>

    <!-- Row 4 -->
    <use href="#big-h" x="0" y="-522" fill="url(#g1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="155" y="-435" fill="url(#g2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="310" y="-522" fill="url(#g1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="465" y="-435" fill="url(#g2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="620" y="-522" fill="url(#g3)" stroke="white" stroke-width="8"/>

    <!-- Row 5 -->
    <use href="#big-h" x="0" y="-696" fill="url(#g2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="155" y="-609" fill="url(#g3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="310" y="-696" fill="url(#g1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="465" y="-609" fill="url(#g2)" stroke="white" stroke-width="8" opacity="0.9"/>

    <!-- Row 6 -->
    <use href="#big-h" x="0" y="-870" fill="url(#g3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="155" y="-783" fill="url(#g1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="310" y="-870" fill="url(#g2)" stroke="white" stroke-width="8" opacity="0.8"/>
    <use href="#big-h" x="465" y="-783" fill="url(#g3)" stroke="white" stroke-width="8" opacity="0.7"/>

    <!-- Row 7 -->
    <use href="#big-h" x="0" y="-1044" fill="url(#g1)" stroke="white" stroke-width="8" opacity="0.9"/>
    <use href="#big-h" x="155" y="-957" fill="url(#g2)" stroke="white" stroke-width="8" opacity="0.7"/>



</g>
    </svg>
</div>

<!-- RIGHT SIDE (BIG HEXAGONS) -->

        <defs>
            <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B6D7F2"/><stop offset="100%" stop-color="#8ED0F0"/></linearGradient>
            <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8ED0F0"/><stop offset="100%" stop-color="#5BAEE8"/></linearGradient>
            <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5BAEE8"/><stop offset="100%" stop-color="#3A72C0"/></linearGradient>
        </defs>
        <g transform="translate(1100, 1100)">
    <!-- Row 1 (Bottom) -->
    <use href="#big-h" x="0" y="0" fill="url(#b1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-155" y="87" fill="url(#b2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-310" y="0" fill="url(#b3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-465" y="87" fill="url(#b1)" stroke="white" stroke-width="8"/>

    <use href="#big-h" x="-310" y="-174" fill="url(#b1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-465" y="-87" fill="url(#b2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-620" y="-174" fill="url(#b3)" stroke="white" stroke-width="8"/>

    <use href="#big-h" x="0" y="-348" fill="url(#b3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-155" y="-261" fill="url(#b1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-310" y="-348" fill="url(#b2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-465" y="-261" fill="url(#b3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-620" y="-348" fill="url(#b1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-775" y="-261" fill="url(#b2)" stroke="white" stroke-width="8"/>

    <!-- Row 4 -->
    <use href="#big-h" x="0" y="-522" fill="url(#b1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-155" y="-435" fill="url(#b2)" stroke="white" stroke-width="8"/>

    <use href="#big-h" x="-465" y="-435" fill="url(#b2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-620" y="-522" fill="url(#b3)" stroke="white" stroke-width="8"/>

    <!-- Row 5 -->
    <use href="#big-h" x="0" y="-696" fill="url(#b2)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-155" y="-609" fill="url(#b3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-310" y="-696" fill="url(#b1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-465" y="-609" fill="url(#b2)" stroke="white" stroke-width="8" opacity="0.9"/>

    <!-- Row 6 -->
    <use href="#big-h" x="0" y="-870" fill="url(#b3)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-155" y="-783" fill="url(#b1)" stroke="white" stroke-width="8"/>
    <use href="#big-h" x="-310" y="-870" fill="url(#b2)" stroke="white" stroke-width="8" opacity="0.8"/>
    <use href="#big-h" x="-465" y="-783" fill="url(#b3)" stroke="white" stroke-width="8" opacity="0.7"/>

    <!-- Row 7 -->
    <use href="#big-h" x="0" y="-1044" fill="url(#b1)" stroke="white" stroke-width="8" opacity="0.9"/>
    <use href="#big-h" x="-155" y="-957" fill="url(#b2)" stroke="white" stroke-width="8" opacity="0.7"/>
</g>
    </svg>
</div>

<!-- MAIN CONTENT -->
<div class="content">
    <div class="greeting-ar">عيد الفطر المبارك</div>
    <div class="greeting-sub">تقبّل الله منّا ومنكم صالح الأعمال</div>
    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-hex"></div>
        <div class="divider-line"></div>
    </div>
    <div class="greeting-en">Eid Al-Fitr Mubarak</div>
    <div class="hijri-date">١ شوّال ١٤٤٦ هـ</div>
